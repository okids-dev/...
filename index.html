<!DOCTYPE html>
<html>
<head>

<title>Rakib IPTV</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#050816;
font-family:Arial;
color:white;
overflow-x:hidden;
}

header{
background:linear-gradient(90deg,#ff1493,#ff69b4);
padding:18px;
text-align:center;
font-size:32px;
font-weight:bold;
box-shadow:0 0 20px #ff1493;
}

.player-container{
position:relative;
background:black;
}

video{
width:100%;
height:240px;
background:black;
}

.search-box{
padding:14px;
background:#0b1225;
}

.search-box input{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:14px;
background:#131c31;
color:white;
outline:none;
}

#channels{
padding:12px;
padding-bottom:120px;
}

.channel{
display:flex;
align-items:center;
gap:16px;
background:#10182d;
padding:16px;
margin-top:12px;
border-radius:18px;
cursor:pointer;
transition:.3s;
font-size:22px;
font-weight:bold;
}

.channel:hover{
background:#ff149320;
transform:scale(1.02);
}

.channel img{
width:60px;
height:60px;
border-radius:14px;
object-fit:cover;
}

.active{
border:2px solid #ff1493;
box-shadow:0 0 12px #ff1493;
}

/* Floating Controls */

.controls{
position:fixed;
bottom:12px;
left:50%;
transform:translateX(-50%);
display:flex;
align-items:center;
gap:10px;
background:rgba(10,10,20,.85);
padding:10px 14px;
border-radius:25px;
backdrop-filter:blur(10px);
z-index:999;
box-shadow:0 0 20px #ff149360;
}

.control-btn{
width:48px;
height:48px;
border:none;
border-radius:50%;
background:#ff1493;
color:white;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.control-btn:active{
transform:scale(.92);
}

.volume{
width:90px;
}

.fullscreen{
font-size:18px;
}

/* Visitor Counter */

.counter{
text-align:center;
padding:12px;
font-size:18px;
background:#111827;
color:white;
font-weight:bold;
}

</style>
</head>

<body>

<header>
🌸 Rakib IPTV 🌸
</header>

<div class="counter">
👀 Live IPTV Visitors
</div>

<div class="player-container">

<video id="video" autoplay controls></video>

</div>

<div class="search-box">

<input type="text"
id="search"
placeholder="Search channel..."
onkeyup="searchChannel()">

</div>

<div id="channels"></div>

<!-- Floating Controls -->

<div class="controls">

<button class="control-btn"
onclick="prevChannel()">⏮</button>

<button class="control-btn"
onclick="togglePlay()">⏯</button>

<button class="control-btn"
onclick="nextChannel()">⏭</button>

<input type="range"
class="volume"
min="0"
max="1"
step="0.1"
value="1"
oninput="changeVolume(this.value)">

<button class="control-btn fullscreen"
onclick="toggleFullscreen()">⛶</button>

</div>

<script>

const playlist =
'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

let channels = [];
let currentIndex = 0;

fetch(playlist)

.then(response => response.text())

.then(data => {

const lines = data.split('\n');

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

const info = lines[i];

const url = lines[i+1];

const name = info.split(',')[1];

let logo = '';

const logoMatch =
info.match(/tvg-logo="(.*?)"/);

if(logoMatch){

logo = logoMatch[1];

}

channels.push({
name,
url,
logo
});

}

}

renderChannels();

if(channels.length > 0){

playChannel(0);

}

});

function renderChannels(){

const container =
document.getElementById('channels');

container.innerHTML = '';

channels.forEach((ch,index)=>{

const div =
document.createElement('div');

div.className = 'channel';

div.innerHTML = `

<img src="${ch.logo}">
<div>${ch.name}</div>

`;

div.onclick = ()=> playChannel(index);

container.appendChild(div);

});

}

function playChannel(index){

currentIndex = index;

const channel = channels[index];

const video =
document.getElementById('video');

if(Hls.isSupported()){

const hls = new Hls();

hls.loadSource(channel.url);

hls.attachMedia(video);

}

else{

video.src = channel.url;

}

document.querySelectorAll('.channel')
.forEach(el=> el.classList.remove('active'));

document.querySelectorAll('.channel')[index]
.classList.add('active');

}

function nextChannel(){

currentIndex++;

if(currentIndex >= channels.length){

currentIndex = 0;

}

playChannel(currentIndex);

}

function prevChannel(){

currentIndex--;

if(currentIndex < 0){

currentIndex = channels.length -1;

}

playChannel(currentIndex);

}

function togglePlay(){

const video =
document.getElementById('video');

if(video.paused){

video.play();

}

else{

video.pause();

}

}

function changeVolume(value){

document.getElementById('video')
.volume = value;

}

function toggleFullscreen(){

const video =
document.getElementById('video');

if(document.fullscreenElement){

document.exitFullscreen();

}

else{

video.requestFullscreen();

}

}

function searchChannel(){

const input =
document.getElementById('search')
.value.toLowerCase();

const channelDivs =
document.querySelectorAll('.channel');

channels.forEach((ch,index)=>{

if(ch.name.toLowerCase()
.includes(input)){

channelDivs[index]
.style.display = 'flex';

}

else{

channelDivs[index]
.style.display = 'none';

}

});

}

</script>

</body>
</html>
