<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rakib IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* HEADER */

.header{

background:#000;
padding:12px;
text-align:center;
border-top:4px solid red;
border-bottom:4px solid red;

}

.header h1{

font-size:34px;
color:white;
text-shadow:0 0 15px red;

}

/* PLAYER */

.player-box{

position:relative;
width:100%;
background:black;

}

video{

width:100%;
height:250px;
background:black;
object-fit:contain;

}

/* CONTROLS */

.custom-controls{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:20px;
z-index:10;
transition:opacity .5s;

}

.control-btn{

width:70px;
height:70px;
border:none;
border-radius:50%;
background:red;
color:white;
font-size:28px;
cursor:pointer;
box-shadow:0 0 15px red;

}

/* SEARCH */

.search-box{

padding:14px;
background:#000;

}

.search-box input{

width:100%;
padding:16px;
font-size:20px;
border-radius:16px;
border:none;
outline:none;
background:#111;
color:white;

}

/* CHANNEL GRID */

.channel-grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:14px;
padding:14px;

}

/* CHANNEL CARD */

.channel{

background:white;
border-radius:24px;
padding:12px;
display:flex;
justify-content:center;
align-items:center;
height:120px;
cursor:pointer;
transition:.3s;
border:3px solid transparent;
animation:borderGlow 4s linear infinite;

}

.channel:hover{

transform:scale(1.05);

}

.channel img{

width:100%;
height:100%;
object-fit:contain;
padding:8px;

}

/* ACTIVE CHANNEL */

.active{

box-shadow:
0 0 20px red,
0 0 40px yellow,
0 0 60px lime;

}

/* GLOW */

@keyframes borderGlow{

0%{
border-color:#00ffff;
box-shadow:0 0 10px #00ffff;
}

25%{
border-color:#ff00ff;
box-shadow:0 0 10px #ff00ff;
}

50%{
border-color:#ffff00;
box-shadow:0 0 10px #ffff00;
}

75%{
border-color:#00ff00;
box-shadow:0 0 10px #00ff00;
}

100%{
border-color:#00ffff;
box-shadow:0 0 10px #00ffff;
}

}

/* FOOTER */

.footer{

text-align:center;
padding:25px;
font-size:30px;
font-weight:bold;
border-top:4px solid red;
margin-top:20px;

}

.footer span{

color:red;

}

/* MOBILE */

@media(max-width:700px){

.channel-grid{

grid-template-columns:repeat(3,1fr);

}

.channel{

height:95px;
padding:10px;

}

.control-btn{

width:60px;
height:60px;
font-size:24px;

}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>Rakib IPTV</h1>

</div>

<!-- PLAYER -->

<div class="player-box">

<video id="video"
autoplay
controls>

</video>

<!-- BUTTONS -->

<div class="custom-controls">

<button class="control-btn"
onclick="prevChannel()">

⏮

</button>

<button class="control-btn"
onclick="togglePlay()">

⏯

</button>

<button class="control-btn"
onclick="nextChannel()">

⏭

</button>

</div>

</div>

<!-- SEARCH -->

<div class="search-box">

<input type="text"
id="search"
placeholder="Search Channel..."
onkeyup="searchChannels()">

</div>

<!-- CHANNELS -->

<div class="channel-grid"
id="channelGrid">

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 <span>RAKIB IPTV</span>

</div>

<script>

/* PLAYLIST */

const playlist =
'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

/* VARIABLES */

let channels = [];

let currentIndex = 0;

/* LOAD PLAYLIST */

fetch(playlist)

.then(response => response.text())

.then(data => {

const lines = data.split('\n');

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

const info = lines[i];

const url = lines[i+1];

const name = info.split(',')[1];

let logo = '';

const logoMatch =
info.match(/tvg-logo="(.*?)"/);

if(logoMatch){

logo = logoMatch[1];

}

channels.push({

name,
url,
logo

});

}

}

renderChannels();

if(channels.length > 0){

playChannel(0);

}

});

/* RENDER */

function renderChannels(){

const grid =
document.getElementById('channelGrid');

grid.innerHTML = '';

channels.forEach((ch,index)=>{

const div =
document.createElement('div');

div.className='channel';

div.innerHTML=`

<img src="${ch.logo}"
alt="${ch.name}">

`;

div.onclick=()=>playChannel(index);

grid.appendChild(div);

});

}

/* PLAY */

function playChannel(index){

currentIndex=index;

const video =
document.getElementById('video');

const channel =
channels[index];

if(Hls.isSupported()){

const hls =
new Hls();

hls.loadSource(channel.url);

hls.attachMedia(video);

}

else{

video.src=channel.url;

}

document.querySelectorAll('.channel')
.forEach(el=>{

el.classList.remove('active');

});

document.querySelectorAll('.channel')[index]
.classList.add('active');

}

/* NEXT */

function nextChannel(){

currentIndex++;

if(currentIndex >= channels.length){

currentIndex=0;

}

playChannel(currentIndex);

}

/* PREV */

function prevChannel(){

currentIndex--;

if(currentIndex < 0){

currentIndex=
channels.length-1;

}

playChannel(currentIndex);

}

/* PLAY PAUSE */

function togglePlay(){

const video =
document.getElementById('video');

if(video.paused){

video.play();

}

else{

video.pause();

}

}

/* SEARCH */

function searchChannels(){

const input =
document.getElementById('search')
.value.toLowerCase();

const cards =
document.querySelectorAll('.channel');

channels.forEach((ch,index)=>{

if(ch.name.toLowerCase()
.includes(input)){

cards[index]
.style.display='flex';

}

else{

cards[index]
.style.display='none';

}

});

}

/* AUTO HIDE CONTROLS */

const controls =
document.querySelector('.custom-controls');

setTimeout(()=>{

controls.style.opacity='0';

},5000);

/* SHOW AGAIN */

document.querySelector('.player-box')
.addEventListener('click',()=>{

controls.style.opacity='1';

setTimeout(()=>{

controls.style.opacity='0';

},5000);

});

</script>

</body>
</html>
