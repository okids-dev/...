<!DOCTYPE html>
<html>
<head>
<title>Rakib IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0f172a;
font-family:Arial;
margin:0;
padding:0;
color:white;
}

header{
background:#111827;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
padding:15px;
}

video{
width:100%;
border-radius:10px;
background:black;
}

.channel{
background:#1e293b;
padding:12px;
margin-top:10px;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

.channel:hover{
background:#334155;
}

</style>
</head>

<body>

<header>
Rakib IPTV
</header>

<div class="container">

<video id="video" controls autoplay></video>

<div class="channel"
onclick="playChannel('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8')">

Channel 1

</div>

<div class="channel"
onclick="playChannel('https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.mpd/.m3u8')">

Channel 2

</div>

</div>

<script>

function playChannel(url){

const video = document.getElementById('video');

if(Hls.isSupported()){

const hls = new Hls();

hls.loadSource(url);

hls.attachMedia(video);

}

else{

video.src = url;

}

}

</script>

</body>
</html>
