<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Rakib IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
transition:.4s;
}

/* LIGHT MODE */

body.light{
background:#efefef;
color:black;
}

body.light .search-box{
background:#efefef;
}

body.light .search-box input{
background:white;
color:black;
}

body.light .header{
background:white;
}

body.light .footer{
background:white;
color:black;
}

body.light .channel{

background:white;

border:3px solid #c44dff;

box-shadow:
0 0 6px #c44dff,
0 0 12px #c44dff;

}

/* DARK MODE */

body:not(.light) .channel{

background:#111;

border:2px solid #222;

box-shadow:none;

}

body:not(.light) .channel img{
filter:brightness(.9);
}

/* HEADER */

.header{
background:#000;
padding:12px;
text-align:center;
border-top:4px solid red;
border-bottom:4px solid red;
position:relative;
}

/* TITLE */

.header h1{

font-size:34px;
font-weight:bold;

color:#ff1a1a;

text-shadow:
0 0 5px rgba(255,0,0,.4),
0 0 10px rgba(255,0,0,.2);

}

/* MODE BUTTON */

.mode-btn{

position:absolute;
right:15px;
top:15px;

background:red;
color:white;

border:none;
padding:8px 14px;

border-radius:12px;
font-size:18px;
cursor:pointer;

}

/* PLAYER */

.player-box{
position:relative;
width:100%;
background:black;
}

video{
width:100%;
height:250px;
background:black;
object-fit:contain;
}

/* CONTROLS */

.custom-controls{

position:absolute;
bottom:45px;
left:50%;

transform:translateX(-50%);

display:flex;
gap:25px;

z-index:10;
transition:opacity .5s;

}

/* BUTTON */

.control-btn{

width:58px;
height:58px;

border:none;
border-radius:50%;

background:red;
color:white;

font-size:22px;
cursor:pointer;

display:flex;
justify-content:center;
align-items:center;

box-shadow:0 0 10px rgba(255,0,0,.5);

}

/* SEARCH */

.search-box{
padding:14px;
background:#000;
transition:.4s;
}

.search-box input{

width:100%;
padding:16px;

font-size:20px;

border-radius:20px;
border:none;
outline:none;

background:#111;
color:white;

transition:.4s;

}

/* GRID */

.channel-grid{

display:grid;
grid-template-columns:repeat(3,1fr);

gap:14px;
padding:14px;

}

/* CHANNEL */

.channel{

border-radius:24px;
padding:12px;

display:flex;
justify-content:center;
align-items:center;

height:120px;

cursor:pointer;
transition:.3s;

}

.channel:hover{
transform:scale(1.03);
}

.channel img{

width:100%;
height:100%;

object-fit:contain;
padding:8px;

}

/* ACTIVE */

.active{

border:2px solid red !important;

}

/* SOCIAL */

.social-box{

display:flex;
justify-content:center;
gap:20px;

padding:10px 0 20px;

}

.social-box a{

width:55px;
height:55px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

text-decoration:none;

font-size:26px;

color:white;

}

.telegram{
background:#229ED9;
}

.facebook{
background:#1877F2;
}

/* FOOTER */

.footer{

text-align:center;
padding:20px;

font-size:22px;
font-weight:bold;

border-top:3px solid red;

transition:.4s;

}

.footer span{
color:red;
}

/* MOBILE */

@media(max-width:700px){

.channel-grid{
grid-template-columns:repeat(3,1fr);
}

.channel{
height:95px;
padding:10px;
}

.control-btn{

width:54px;
height:54px;

font-size:20px;

}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>Rakib IPTV</h1>

<button class="mode-btn"
onclick="toggleMode()">

🌙

</button>

</div>

<!-- PLAYER -->

<div class="player-box">

<video id="video"
autoplay
controls>

</video>

<!-- BUTTONS -->

<div class="custom-controls">

<button class="control-btn"
onclick="prevChannel()">

⏮

</button>

<button class="control-btn"
onclick="togglePlay()">

▶

</button>

<button class="control-btn"
onclick="nextChannel()">

⏭

</button>

</div>

</div>

<!-- SEARCH -->

<div class="search-box">

<input type="text"
id="search"

placeholder="Search Channel..."

onkeyup="searchChannels()">

</div>

<!-- CHANNELS -->

<div class="channel-grid"
id="channelGrid">

</div>

<!-- SOCIAL -->

<div class="social-box">

<a href="https://t.me/rprakib49"
target="_blank"
class="telegram">

<i class="fab fa-telegram-plane"></i>

</a>

<a href="https://www.facebook.com/rprakib49"
target="_blank"
class="facebook">

<i class="fab fa-facebook-f"></i>

</a>

</div>

<!-- FOOTER -->

<div class="footer">

© 2026 <span>RAKIB IPTV</span>

</div>

<script>

/* PLAYLIST */

const playlist =
'https://raw.githubusercontent.com/Rakib49/Rakibiptv/refs/heads/main/aynaott.m3u';

/* VARIABLES */

let channels = [];

let currentIndex = 0;

/* LOAD PLAYLIST */

fetch(playlist)

.then(response => response.text())

.then(data => {

const lines = data.split('\n');

for(let i=0;i<lines.length;i++){

if(lines[i].startsWith('#EXTINF')){

const info = lines[i];

const url = lines[i+1];

const name = info.split(',')[1];

let logo = '';

const logoMatch =
info.match(/tvg-logo="(.*?)"/);

if(logoMatch){

logo = logoMatch[1];

}

channels.push({

name,
url,
logo

});

}

}

renderChannels();

if(channels.length > 0){

playChannel(0);

}

});

/* RENDER */

function renderChannels(){

const grid =
document.getElementById('channelGrid');

grid.innerHTML = '';

channels.forEach((ch,index)=>{

const div =
document.createElement('div');

div.className='channel';

div.innerHTML=`

<img src="${ch.logo}"
alt="${ch.name}">

`;

div.onclick=()=>playChannel(index);

grid.appendChild(div);

});

}

/* PLAY */

function playChannel(index){

currentIndex=index;

const video =
document.getElementById('video');

const channel =
channels[index];

if(Hls.isSupported()){

const hls =
new Hls();

hls.loadSource(channel.url);

hls.attachMedia(video);

}

else{

video.src=channel.url;

}

document.querySelectorAll('.channel')
.forEach(el=>{

el.classList.remove('active');

});

document.querySelectorAll('.channel')[index]
.classList.add('active');

}

/* NEXT */

function nextChannel(){

currentIndex++;

if(currentIndex >= channels.length){

currentIndex=0;

}

playChannel(currentIndex);

}

/* PREV */

function prevChannel(){

currentIndex--;

if(currentIndex < 0){

currentIndex=
channels.length-1;

}

playChannel(currentIndex);

}

/* PLAY PAUSE */

function togglePlay(){

const video =
document.getElementById('video');

const btns =
document.querySelectorAll('.control-btn');

if(video.paused){

video.play();

btns[1].innerHTML='⏸';

}

else{

video.pause();

btns[1].innerHTML='▶';

}

}

/* SEARCH */

function searchChannels(){

const input =
document.getElementById('search')
.value.toLowerCase();

const cards =
document.querySelectorAll('.channel');

channels.forEach((ch,index)=>{

if(ch.name.toLowerCase()
.includes(input)){

cards[index]
.style.display='flex';

}

else{

cards[index]
.style.display='none';

}

});

}

/* DARK LIGHT MODE */

function toggleMode(){

document.body.classList.toggle('light');

const btn =
document.querySelector('.mode-btn');

if(document.body.classList.contains('light')){

btn.innerHTML='☀️';

}

else{

btn.innerHTML='🌙';

}

}

/* AUTO HIDE CONTROLS */

const controls =
document.querySelector('.custom-controls');

setTimeout(()=>{

controls.style.opacity='0';

},5000);

/* SHOW AGAIN */

document.querySelector('.player-box')
.addEventListener('click',()=>{

controls.style.opacity='1';

setTimeout(()=>{

controls.style.opacity='0';

},5000);

});

</script>

</body>
</html>
